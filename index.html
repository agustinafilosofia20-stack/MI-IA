<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>IA Pro</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 400px;
  height: 600px;
  background: #020617;
  border-radius: 20px;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  padding: 15px;
  text-align: center;
  background: #020617;
  border-bottom: 1px solid #1e293b;
  font-weight: bold;
}

#chat {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.msg {
  max-width: 70%;
  margin: 10px 0;
  padding: 10px 14px;
  border-radius: 15px;
  animation: fadeIn 0.3s ease;
}

.user {
  background: #3b82f6;
  margin-left: auto;
}

.bot {
  background: #1e293b;
}

.typing {
  font-style: italic;
  opacity: 0.6;
}

#inputArea {
  display: flex;
  padding: 10px;
  background: #020617;
  border-top: 1px solid #1e293b;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #1e293b;
  color: white;
}

button {
  margin-left: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(5px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <header>🤖 IA Pro</header>

  <div id="chat"></div>

  <div id="inputArea">
    <input id="msg" placeholder="Escribí un mensaje..." />
    <button onclick="enviar()">➤</button>
  </div>
</div>

<script>
const chat = document.getElementById("chat");

function agregarMensaje(texto, tipo) {
  const div = document.createElement("div");
  div.className = "msg " + tipo;
  div.innerText = texto;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function enviar() {
  const input = document.getElementById("msg");
  const mensaje = input.value;

  if (!mensaje) return;

  agregarMensaje(mensaje, "user");
  input.value = "";

  const typing = document.createElement("div");
  typing.className = "msg bot typing";
  typing.innerText = "Escribiendo...";
  chat.appendChild(typing);

  try {
    const res = await fetch("http://localhost:3000/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ mensaje })
    });

    const data = await res.json();

    typing.remove();
    agregarMensaje(data.respuesta || "Sin respuesta", "bot");

  } catch (error) {
    typing.remove();
    agregarMensaje("Error conectando con la IA", "bot");
  }
}
</script>

</body>
</html>
